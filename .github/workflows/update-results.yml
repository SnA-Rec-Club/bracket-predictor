name: Update results

on:
  schedule:
    - cron: '0 * * * *'      # hourly, on the hour (UTC)
  workflow_dispatch:          # manual run from the Actions tab
    inputs:
      dry_run:
        description: 'Dry run (fetch + log only, no Firestore writes)'
        type: boolean
        default: false
      r32_overrides:
        description: 'Manual R32 group-winner overrides, e.g. "1E=Germany, 1A=Mexico, 1D=USA"'
        type: string
        default: ''
      lock_at:
        description: 'Set the submission deadline (ISO UTC, e.g. 2026-06-29T15:59:00Z). Blank = leave unchanged.'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run updater
        working-directory: scripts
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          OVERRIDES: ${{ inputs.r32_overrides }}
          LOCK_AT: ${{ inputs.lock_at }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: node update-results.mjs
